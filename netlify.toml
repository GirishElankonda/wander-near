[build]
  command = "npm run build"
  publish = "dist"

# Redirect all routes to their HTML pages (multi-page app)
[[redirects]]
  from = "/trip-planner"
  to = "/trip-planner.html"
  status = 200

[[redirects]]
  from = "/trip-planner/"
  to = "/trip-planner.html"
  status = 200

# SPA fallback for index
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
